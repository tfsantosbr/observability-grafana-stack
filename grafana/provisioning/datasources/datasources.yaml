apiVersion: 1

datasources:
  # ── Prometheus ───────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
          urlDisplayLabel: View Trace in Tempo

  # ── Loki ────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      # Auto-link trace IDs found in log lines to Tempo
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '(?:traceID|trace_id|traceid)=(\w+)'
          name: TraceID
          url: "${__value.raw}"
          urlDisplayLabel: View Trace in Tempo

  # ── Tempo ────────────────────────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    access: proxy
    jsonData:
      httpMethod: GET
      # Service graph via Prometheus metrics generated by Tempo
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      # Link traces back to logs in Loki
      lokiSearch:
        datasourceUid: loki
      traceQuery:
        timeShiftEnabled: true
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
      spanBar:
        type: Tag
        tag: http.url
