global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # OTel Collector self-metrics
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
